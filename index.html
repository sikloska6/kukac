<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steve kérdés</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .btn-container {
            display: flex;
            gap: 20px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-igen {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            box-shadow: 0 4px 15px rgba(56, 239, 125, 0.4);
        }

        .btn-nem {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4);
        }

        /* Animált felugró üzenet stílusa */
        .overlay-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 4rem;
            font-weight: 900;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            white-space: nowrap;
        }

        /* Belépő animáció */
        @keyframes popupAnimation {
            0% {
                transform: translate(-50%, -50%) scale(0) rotate(-10deg);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2) rotate(5deg);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        /* Kilépő animáció (eltűnés) */
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translate(-50%, -60%) scale(0.8);
            }
        }

        .show-popup {
            animation: popupAnimation 0.4s ease-out forwards;
        }

        .hide-popup {
            animation: fadeOut 0.3s ease-in forwards;
        }

        .text-igen {
            color: #38ef7d;
            text-shadow: 0 0 20px rgba(56, 239, 125, 0.6);
        }

        .text-nem {
            color: #ff4b2b;
            text-shadow: 0 0 20px rgba(255, 75, 43, 0.6);
        }
    </style>
</head>
<body>

    <h1>Steve jó?</h1>

    <div class="btn-container">
        <button class="btn-igen" onclick="mutat('igen')">Igen</button>
        <button class="btn-nem" onclick="mutat('nem')">Nem</button>
    </div>
